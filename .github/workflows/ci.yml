name: ci
on:
  pull_request: {}
  push:
    tags:
      - "v*"
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build / debug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: make build

  build-release:
    name: build / release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - run: make build-release
      - uses: actions/upload-artifact@v4
        with:
          name: kubernix-release
          path: target/release/kubernix

  build-static:
    name: build / static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-static-${{ hashFiles('**/Cargo.lock') }}
      - run: make build-static
      - uses: actions/upload-artifact@v4
        with:
          name: kubernix-static
          path: target/x86_64-unknown-linux-gnu/release/kubernix

  deploy:
    name: deploy / release
    runs-on: ubuntu-latest
    needs: build-static
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kubernix-static
      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: kubernix

  docs:
    name: docs / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
      - run: make docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc

  docs-publish:
    name: docs / publish
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: doc
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc

  lint-clippy:
    name: lint / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - run: make lint-clippy

  lint-rustfmt:
    name: lint / rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: make lint-rustfmt

  lint-audit:
    name: lint / audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cargo-audit
      - run: make lint-audit

  lint-dependencies:
    name: lint / dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint-dependencies

  test-unit:
    name: test / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/bin
            ~/go/pkg
            ~/bin
          key: ${{ runner.os }}-test-tools-cfssl-1.6.5-etcd-3.5.21
      - name: Install test dependencies
        run: |
          mkdir -p ~/bin
          go install github.com/cloudflare/cfssl/cmd/cfssl@v1.6.5
          go install github.com/cloudflare/cfssl/cmd/cfssljson@v1.6.5
          ETCD_VER=v3.5.21
          if [ ! -f ~/bin/etcd ]; then
            curl -fsSL https://github.com/etcd-io/etcd/releases/download/${ETCD_VER}/etcd-${ETCD_VER}-linux-amd64.tar.gz | \
              tar xzf - -C ~/bin --strip-components=1 etcd-${ETCD_VER}-linux-amd64/etcd
          fi
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          echo "$HOME/bin" >> $GITHUB_PATH
      - run: make test-unit

